name: Codex Fix On Mention

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@codex fix') &&
      github.event.comment.user.login != 'github-actions[bot]' &&
      (
        github.event.comment.user.login == github.repository_owner ||
        contains(fromJSON('["priveperfumes"]'), github.event.comment.user.login)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Gather PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('number', String(pr.number));
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('same_repo', String(pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));

      - name: Exit for fork PRs
        if: ${{ steps.pr.outputs.same_repo != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body: 'I can only auto-push fixes for PRs from branches in this repository. For fork PRs, I can still review and propose patch text.'
            });

      - name: Stop for fork PRs
        if: ${{ steps.pr.outputs.same_repo != 'true' }}
        run: exit 0

      - name: Check for recent bot commits (collision guard)
        if: ${{ steps.pr.outputs.same_repo == 'true' }}
        id: collision
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 5
            });

            if (commits.length === 0) {
              core.setOutput('blocked', 'false');
              return;
            }

            const lastCommit = commits[commits.length - 1];
            const author = (lastCommit.commit.author || {}).name || '';
            const committer = (lastCommit.commit.committer || {}).name || '';
            const isBot = author.includes('github-actions') || committer.includes('github-actions') ||
                          author.includes('[bot]') || committer.includes('[bot]');

            if (!isBot) {
              core.setOutput('blocked', 'false');
              return;
            }

            // Bot committed recently — check if within last 5 minutes
            const commitDate = new Date(lastCommit.commit.author.date);
            const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000);

            if (commitDate > fiveMinAgo) {
              core.setOutput('blocked', 'true');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: 'Skipping `@codex fix` — a bot already pushed fixes less than 5 minutes ago. Wait for the review cycle to complete.'
              });
            } else {
              core.setOutput('blocked', 'false');
            }

      - name: Checkout PR head
        if: ${{ steps.pr.outputs.same_repo == 'true' && steps.collision.outputs.blocked != 'true' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Build context from PR comments
        if: ${{ steps.pr.outputs.same_repo == 'true' && steps.collision.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100
            });

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner, repo, pull_number: prNumber, per_page: 100
            });

            let md = `PR #${prNumber}\n\n`;
            md += `Trigger comment:\n${context.payload.comment.body}\n\n`;
            md += 'Issue comments:\n';
            for (const c of issueComments.slice(-50)) {
              md += `- @${c.user.login}: ${String(c.body || '').replace(/\n/g, ' ')}\n`;
            }
            md += '\nReview comments:\n';
            for (const c of reviewComments.slice(-100)) {
              md += `- ${c.path || 'file'}:${c.line || '?'} @${c.user.login}: ${String(c.body || '').replace(/\n/g, ' ')}\n`;
            }

            fs.mkdirSync('.codex/context', { recursive: true });
            fs.writeFileSync('.codex/context/pr-feedback.md', md);

      - name: Run Codex fix
        if: ${{ steps.pr.outputs.same_repo == 'true' && steps.collision.outputs.blocked != 'true' }}
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.3-codex
          sandbox: workspace-write
          prompt: |
            You are fixing PR #${{ steps.pr.outputs.number }} for ${{ github.repository }}.

            The command in the PR comment asked for fixes. Use this context file:
            - .codex/context/pr-feedback.md

            Task:
            - Address the actionable review feedback in that file.
            - Keep edits minimal and directly related to feedback.
            - Do not do broad refactors.
            - If no concrete fix is needed, do not change files.

      - name: Commit and push changes
        if: ${{ steps.pr.outputs.same_repo == 'true' && steps.collision.outputs.blocked != 'true' }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: apply Codex-requested PR fixes"
          git push origin HEAD:${{ steps.pr.outputs.head_ref }}

      - name: Report outcome
        if: ${{ steps.pr.outputs.same_repo == 'true' && steps.collision.outputs.blocked != 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { execSync } = require('child_process');
            let body = 'I processed `@codex fix`.';
            try {
              const sha = execSync('git rev-parse --short HEAD').toString().trim();
              body += ` Pushed changes in commit ${sha}.`;
            } catch (_) {
              body += ' No commit was created (likely no file changes were needed).';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body,
            });
