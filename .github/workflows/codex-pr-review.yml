name: Codex PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Fetch base/head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.3-codex
          sandbox: read-only
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Review ONLY the changes introduced by this PR:
            - Base: ${{ github.event.pull_request.base.sha }}
            - Head: ${{ github.event.pull_request.head.sha }}

            Focus on bugs, regressions, security risks, and missing tests.
            Keep findings concise and actionable.
            If there are no major issues, say so explicitly.

            PR title:
            ${{ github.event.pull_request.title }}

            PR body:
            ${{ github.event.pull_request.body }}

      - name: Post review summary
        if: ${{ steps.run_codex.outputs.final-message != '' }}
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Codex Review\n\n${process.env.CODEX_FINAL_MESSAGE}`,
            });
