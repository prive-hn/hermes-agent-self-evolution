name: Linear Bridge

on:
  pull_request:
    types: [opened, ready_for_review, closed]

permissions:
  pull-requests: write

jobs:
  bridge:
    # Only for non-draft PRs from the same repo (not forks)
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Bridge PR to Linear
        uses: actions/github-script@v7
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        with:
          github-token: ${{ github.token }}
          script: |
            const LINEAR_API_KEY = process.env.LINEAR_API_KEY;
            if (!LINEAR_API_KEY) {
              console.log('LINEAR_API_KEY secret not set, skipping bridge');
              return;
            }

            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prTitle = pr.title;
            const prBody = pr.body || '';
            const prUrl = pr.html_url;
            const repoName = context.repo.repo;
            const isMerged = pr.merged;

            const TEAM_ID = '6f0a4229-08bb-4cf5-a1bf-fe07fed36fc3'; // PRV
            const IN_REVIEW_STATE = 'c1bf9065-d602-43e9-8177-e3ca3d7b1253';
            const DONE_STATE = 'af811b11-9d25-424e-800e-3d6dd02da5b8';

            // Linear GraphQL helper
            async function linearGql(query, variables = {}) {
              const res = await fetch('https://api.linear.app/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': LINEAR_API_KEY,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              const data = await res.json();
              if (data.errors) {
                throw new Error(`Linear API error: ${JSON.stringify(data.errors)}`);
              }
              return data.data;
            }

            // Find Linear issue by PRV-XXX reference in title/body
            function findIssueRef() {
              const combined = `${prTitle} ${prBody}`;
              const m = combined.match(/PRV-(\d+)/i);
              return m ? parseInt(m[1]) : null;
            }

            // Fetch issue by number
            async function fetchIssue(number) {
              const result = await linearGql(`
                query($number: Float!, $teamKey: String!) {
                  issues(filter: { number: { eq: $number }, team: { key: { eq: $teamKey } } }, first: 1) {
                    nodes { id identifier title state { id name } }
                  }
                }
              `, { number, teamKey: 'PRV' });
              return result.issues.nodes[0] || null;
            }

            // === MERGE HANDLER: close Linear issue ===
            if (isMerged) {
              const issueNumber = findIssueRef();
              if (!issueNumber) {
                console.log('PR merged but no PRV-XXX reference found, skipping close');
                return;
              }
              const issue = await fetchIssue(issueNumber);
              if (!issue) {
                console.log(`PRV-${issueNumber} not found in Linear`);
                return;
              }
              if (issue.state.id === DONE_STATE) {
                console.log(`${issue.identifier} already Done`);
                return;
              }
              await linearGql(`
                mutation($id: String!, $input: IssueUpdateInput!) {
                  issueUpdate(id: $id, input: $input) { success }
                }
              `, { id: issue.id, input: { stateId: DONE_STATE } });
              await linearGql(`
                mutation($input: CommentCreateInput!) {
                  commentCreate(input: $input) { success }
                }
              `, { input: {
                issueId: issue.id,
                body: `PR merged: ${prUrl}\n\n${repoName} — ${prTitle}`,
              }});
              console.log(`Closed ${issue.identifier} (PR merged)`);
              return;
            }

            // Guard: closed-but-not-merged PRs should not enter the open/ready path
            if (pr.state === 'closed') {
              console.log('PR closed without merge, skipping bridge');
              return;
            }

            // === OPEN / READY: link or create Linear issue ===
            const issueNumber = findIssueRef();
            if (issueNumber) {
              const issue = await fetchIssue(issueNumber);
              if (issue) {
                console.log(`Found ${issue.identifier}: ${issue.title} (state: ${issue.state.name})`);
                await linearGql(`
                  mutation($input: CommentCreateInput!) {
                    commentCreate(input: $input) { success }
                  }
                `, { input: {
                  issueId: issue.id,
                  body: `External PR opened: ${prUrl}\n\nRepo: ${repoName}\nTitle: ${prTitle}`,
                }});
                if (issue.state.id !== IN_REVIEW_STATE && issue.state.id !== DONE_STATE) {
                  await linearGql(`
                    mutation($id: String!, $input: IssueUpdateInput!) {
                      issueUpdate(id: $id, input: $input) { success }
                    }
                  `, { id: issue.id, input: { stateId: IN_REVIEW_STATE } });
                  console.log(`Moved ${issue.identifier} to In Review`);
                }
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `Linked to Linear: [${issue.identifier}](https://linear.app/priveperfumes/issue/${issue.identifier.toLowerCase()})`,
                });
                console.log('Bridge complete — linked existing issue');
                return;
              }
            }

            // No existing Linear issue — create one
            const projectId = await findProjectId(repoName);
            if (projectId) {
              console.log(`Matched repo ${repoName} to Linear project`);
            } else {
              console.log(`No Linear project matched for repo ${repoName}, creating issue without project`);
            }

            const createInput = {
              teamId: TEAM_ID,
              title: prTitle,
              description: `Auto-created from [PR #${prNumber}](${prUrl}) in ${repoName}.\n\n${prBody}`,
              stateId: IN_REVIEW_STATE,
            };
            if (projectId) {
              createInput.projectId = projectId;
            }

            const createResult = await linearGql(`
              mutation($input: IssueCreateInput!) {
                issueCreate(input: $input) {
                  success
                  issue { id identifier title }
                }
              }
            `, { input: createInput });

            if (!createResult.issueCreate.success) {
              throw new Error('Failed to create Linear issue');
            }

            const newIssue = createResult.issueCreate.issue;
            console.log(`Created ${newIssue.identifier}: ${newIssue.title}`);

            await linearGql(`
              mutation($input: CommentCreateInput!) {
                commentCreate(input: $input) { success }
              }
            `, { input: {
              issueId: newIssue.id,
              body: `PR opened: ${prUrl}\n\nRepo: ${repoName}`,
            }});

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Linked to Linear: [${newIssue.identifier}](https://linear.app/priveperfumes/issue/${newIssue.identifier.toLowerCase()})\n\nPipeline will track review and deploy automatically.`,
            });

            console.log(`Bridge complete — created ${newIssue.identifier}`);

            // Dynamic project lookup
            async function findProjectId(repo) {
              const result = await linearGql(`
                query($teamId: String!) {
                  team(id: $teamId) {
                    projects { nodes { id name } }
                  }
                }
              `, { teamId: TEAM_ID });
              const projects = result.team.projects.nodes;
              let match = projects.find(p => p.name === repo);
              if (match) return match.id;
              match = projects.find(p => p.name.endsWith(repo));
              if (match) return match.id;
              match = projects.find(p => p.name.startsWith(repo));
              if (match) return match.id;
              match = projects.find(p => p.name.includes(repo));
              if (match) return match.id;
              return null;
            }
